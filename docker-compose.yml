services:
  vllm-llm:
    build: ./vllm
    image: vllm-qwen3.5-122b:latest
    container_name: vllm-llm
    ipc: host
    runtime: nvidia
    environment:
      - VLLM_USE_V1=0
      - NVIDIA_VISIBLE_DEVICES=0
      - HF_HOME=/workspace/hf_cache
      - HF_HUB_CACHE=/workspace/hf_cache
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - /workspace/hf_cache:/workspace/hf_cache
    command: >
      --model Sehyo/Qwen3.5-122B-A10B-NVFP4
      --served-model-name qwen3.5-122b
      --max-model-len 32768
      --gpu-memory-utilization 0.92
      --kv-cache-dtype auto
      --dtype bfloat16
      --trust-remote-code
      --enable-prefix-caching
      --enable-chunked-prefill
      --max-num-seqs 16
      --limit-mm-per-prompt '{"image": 1}'
      --moe-backend flashinfer_cutlass
      --mamba-cache-mode align
      --mamba-block-size 8
      --disable-log-stats
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

  backend:
    build: ./backend
    image: image-to-csv-backend:latest
    container_name: image-to-csv
    ports:
      - "9001:8000"
    environment:
      - VLLM_URL=http://vllm-llm:8000
      - LLM_URL=http://vllm-llm:8000
    volumes:
      - ./client:/app/static:ro
    depends_on:
      vllm-llm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
